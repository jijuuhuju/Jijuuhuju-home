<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jijuuhujuホーム</title>
    <style>
        /* 全体のリセット設定 */
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: #f0f8ff; /* 下半分の薄い青色の背景 */
        }

        /* 1. ヘッダー（上半分の水色エリア） */
        .header-area {
            background-color: #98e8e8; /* 水色 */
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* サイト名テキスト */
        .site-title {
            font-size: 24px;
            font-weight: bold;
            color: #333333;
        }

        /* icon.svgを置くグレーの箱 */
        .icon-box {
            background-color: #d3d3d3; /* グレー */
            width: 300px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 読み込んだ画像のサイズ調整 */
        .icon-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* 2. メインコンテンツ（下半分のエリア） */
        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            padding: 60px 20px;
        }

        /* streech.svgを置く黄緑の箱 */
        .streech-box {
            background-color: #00ff00; /* 黄緑 */
            width: 220px;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 読み込んだ画像のサイズ調整 */
        .streech-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* サービスをすべて見る（オレンジのボタン） */
        .service-button {
            background-color: #ff9900; /* オレンジ */
            color: #ffffff; /* 白文字 */
            width: 440px;
            height: 190px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 4px;
            
            /* 触れた時と、離れて戻る時の両方を滑らかにする設定 */
            transition: transform 0.3s ease-out, background-color 0.3s ease-out;
        }

        /* マウスが乗ったときの変化 */
        .service-button:hover {
            transform: scale(1.05); /* 1.05倍に拡大 */
            background-color: #ffaa22; /* 色を少し明るく */
        }
    </style>
</head>
<body>

    <!-- ヘッダーエリア -->
    <div class="header-area">
        <div class="site-title">jijuuhujuホーム</div>
        <div class="icon-box">
            <img src="icon.svg" alt="アイコン画像">
        </div>
    </div>

    <!-- メインコンテンツエリア -->
    <div class="main-container">
        <div class="streech-box">
            <img src="streech.svg" alt="ストレッチ画像">
        </div>
        
        <!-- オレンジのボタン -->
        <a href="service.html" class="service-button">
            サービスをすべて見る
        </a>
    </div>

</body>
</html>
