<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サービス一覧 - jijuuhujuホーム</title>
    <style>
        /* 全体のリセット設定 */
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: #f0f8ff;
            min-height: 100vh;
            position: relative;
        }

        /* 🏠 画面右上の「戻る」ボタン */
        .back-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #333333;
            color: #ffffff;
            padding: 10px 20px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            
            /* 触れた時と、離れて戻る時の両方を滑らかにする設定 */
            transition: transform 0.3s ease-out, background-color 0.3s ease-out;
        }
        .back-button:hover {
            transform: scale(1.08); /* 戻るボタンを少し大きく */
            background-color: #555555;
        }

        /* コンテンツ全体の配置調整 */
        .content-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            padding: 80px 20px;
        }

        /* 共通：サービスの大きな箱（リンク） */
        .service-card {
            width: 600px;
            height: 200px;
            display: flex;
            align-items: center;
            padding: 0 40px;
            box-sizing: border-box;
            gap: 30px;
            text-decoration: none;
            
            /* 触れた時と、離れて戻る時の両方を滑らかにする設定 */
            transition: transform 0.3s ease-out;
        }
        
        /* マウスが乗ったときの変化 */
        .service-card:hover {
            transform: scale(1.03); /* 大きな箱を少し大きく */
        }

        /* 共通：画像が入る白い四角の箱 */
        .img-box {
            background-color: #ffffff;
            width: 130px;
            height: 130px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }
        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* 1. 上の段：streechエリア（紫色） */
        .streech-section {
            background-color: #ccb3ff;
        }
        .streech-text {
            color: #ffffff;
            font-size: 64px;
            font-weight: bold;
        }

        /* 2. 下の段：Jijuuhuju_pbページエリア（黄色） */
        .jijuu-section {
            background-color: #ffffaa;
        }
        .jijuu-text {
            color: #000000;
            font-size: 28px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- 右上の戻るボタン -->
    <a href="index.html" class="back-button">← 戻る</a>

    <!-- メインコンテンツ -->
    <div class="content-container">

        <!-- 上段：streechエリア -->
        <a href="https://jijuuhuju.github.io/Streech-editor/" target="_blank" class="service-card streech-section">
            <div class="img-box">
                <img src="streech.svg" alt="Streech画像">
            </div>
            <div class="streech-text">streech</div>
        </a>

        <!-- 下段：Jijuuhuju_pbページエリア -->
        <a href="https://scratch.mit.edu/users/jijuuhuju_pb/" target="_blank" class="service-card jijuu-section">
            <div class="img-box">
                <img src="icon.svg" alt="icon画像">
            </div>
            <div class="jijuu-text">Jijuuhuju_pbページ</div>
        </a>

    </div>

</body>
</html>
