<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サービス一覧 - jijuuhujuホーム</title>
    <style>
        /* 全体のリセット設定 */
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: #f0f8ff;
            min-height: 100vh;
            position: relative;
        }

        /* 🏠 画面右上の「戻る」ボタン */
        .back-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #333333;
            color: #ffffff;
            padding: 10px 20px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.3s ease-out, background-color 0.3s ease-out;
            z-index: 10;
        }
        .back-button:hover {
            transform: scale(1.08);
            background-color: #555555;
        }

        /* コンテンツ全体の配置調整（完全に独立した3つの箱を縦に並べます） */
        .content-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px; /* 箱と箱の間のすきま */
            padding: 100px 20px;
        }

        /* 共通：サービスの大きな箱（どこを触っても確実に100%反応します） */
        .service-card {
            width: 600px;
            height: 160px; /* 3つが綺麗に画面に収まるスマートな高さ */
            display: flex;
            align-items: center;
            padding: 0 40px;
            box-sizing: border-box;
            gap: 30px;
            text-decoration: none;
            transition: transform 0.3s ease-out; /* 離れたときに滑らかに元に戻る設定 */
        }
        
        /* 触れたときは、どの箱も滑らかに少し大きくなります */
        .service-card:hover {
            transform: scale(1.03);
        }

        /* 共通：画像が入る白い四角の箱 */
        .img-box {
            background-color: #ffffff;
            width: 110px;
            height: 110px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }
        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* 🟣 streechエリア共通（紫色） */
        .streech-section {
            background-color: #ccb3ff;
        }
        .streech-text {
            color: #ffffff;
            font-weight: bold;
        }

        /* 🟡 Jijuuhuju_pbページエリア（黄色） */
        .jijuu-section {
            background-color: #ffffaa;
        }
        .jijuu-text {
            color: #000000;
            font-size: 28px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- 右上の戻るボタン -->
    <a href="index.html" class="back-button">← 戻る</a>

    <!-- メインコンテンツ -->
    <div class="content-container">

        <!-- 
            👇 【独立した箱1つ目】streechボタン（紫色）
            「ここにstreechボタンのURLを入れる」の部分に実際のURLを貼り付ける
        -->
        <a href="https://jijuuhuju.github.io/Streech-editor/" target="_blank" class="service-card streech-section">
            <div class="img-box">
                <img src="streech.svg" alt="Streech画像">
            </div>
            <div class="streech-text" style="font-size: 54px;">streech</div>
        </a>

        <!-- 
            👇 【独立した箱2つ目】streechリンク一覧ボタン（紫色・完全に別の場所に独立させました）
            「ここにstreechリンク一覧のURLを入れる」の部分に実際のURLを貼り付けてください。
        -->
        <a href="ここにstreechリンク一覧のURLを入れる" target="_blank" class="service-card streech-section">
            <div class="img-box">
                <img src="streech.svg" alt="Streech画像">
            </div>
            <div class="streech-text" style="font-size: 40px;">streechリンク一覧</div>
        </a>

        <!-- 
            👇 【独立した箱3つ目】Jijuuhuju_pbページボタン（黄色）
            「ここにJijuuhuju_pbページのURLを入れる」の部分に実際のURLを貼り付けてください。
        -->
        <a href="https://scratch.mit.edu/users/jijuuhuju_pb/" target="_blank" class="service-card jijuu-section">
            <div class="img-box">
                <img src="icon.svg" alt="icon画像">
            </div>
            <div class="jijuu-text">Jijuuhuju_pbページ</div>
        </a>

    </div>

</body>
</html>
